basePath: /
definitions:
  github_com_TranTheTuan_go-shortener_internal_repository.Click:
    properties:
      clicked_at:
        type: string
      id:
        type: integer
      ip_address:
        type: string
      link_id:
        type: integer
      referrer:
        type: string
      user_agent:
        type: string
    type: object
  github_com_TranTheTuan_go-shortener_internal_repository.Plan:
    properties:
      code:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      monthly_link_quota:
        type: integer
      name:
        type: string
      paddle_price_id_monthly:
        type: string
      paddle_price_id_yearly:
        type: string
      price_cents:
        type: integer
      updated_at:
        type: string
    type: object
  github_com_TranTheTuan_go-shortener_internal_repository.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      terms_accepted_at:
        type: string
      terms_version:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_TranTheTuan_go-shortener_internal_service.LinkStats:
    properties:
      recent_clicks:
        items:
          $ref: '#/definitions/github_com_TranTheTuan_go-shortener_internal_repository.Click'
        type: array
      short_code:
        type: string
      total_clicks:
        type: integer
    type: object
  github_com_TranTheTuan_go-shortener_pkg_response.Envelope:
    properties:
      data: {}
      error:
        $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.ErrorBody'
    type: object
  github_com_TranTheTuan_go-shortener_pkg_response.ErrorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internal_handler.acceptTermsRequest:
    properties:
      version:
        type: string
    type: object
  internal_handler.bulkJobResponse:
    properties:
      created_at:
        type: string
      done_rows:
        type: integer
      id:
        type: integer
      result_url:
        type: string
      status:
        type: string
      total_rows:
        type: integer
    type: object
  internal_handler.confirmRequest:
    properties:
      file_key:
        type: string
      filename:
        type: string
      row_count:
        type: integer
    type: object
  internal_handler.createLinkRequest:
    properties:
      expires_at:
        type: string
      url:
        type: string
    type: object
  internal_handler.createLinkResponse:
    properties:
      expires_at:
        type: string
      original_url:
        type: string
      short_code:
        type: string
      short_url:
        type: string
    type: object
  internal_handler.linkListItem:
    properties:
      created_at:
        type: string
      expires_at:
        type: string
      is_active:
        type: boolean
      original_url:
        type: string
      short_code:
        type: string
      short_url:
        type: string
      total_clicks:
        type: integer
    type: object
  internal_handler.linkResponse:
    properties:
      expires_at:
        type: string
      is_active:
        type: boolean
      original_url:
        type: string
      short_code:
        type: string
      short_url:
        type: string
    type: object
  internal_handler.listResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_handler.linkListItem'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  internal_handler.portalURLPayload:
    properties:
      url:
        type: string
    type: object
  internal_handler.subscriptionPayload:
    properties:
      plan: {}
      quota_remaining:
        type: integer
      subscription: {}
    type: object
  internal_handler.updateLinkRequest:
    properties:
      expires_at:
        type: string
      is_active:
        type: boolean
    type: object
  internal_handler.upgradeRequest:
    properties:
      interval:
        type: string
      plan_id:
        type: integer
    type: object
  internal_handler.uploadURLRequest:
    properties:
      content_md5:
        type: string
      filename:
        type: string
      row_count:
        type: integer
    type: object
  internal_handler.uploadURLResponse:
    properties:
      file_key:
        type: string
      presigned_url:
        type: string
    type: object
info:
  contact: {}
  description: |-
    URL shortener with click analytics, built on Echo + GORM + PostgreSQL.
    All responses use a uniform envelope: success payloads under `data`, errors under `error`.
  title: Go URL Shortener API
  version: "1.0"
paths:
  /{code}:
    get:
      description: Resolves a short code and issues a 302 redirect. Records the click
        asynchronously.
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: redirect to the original URL
        "404":
          description: short link not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "410":
          description: short link has expired
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      summary: Redirect to the original URL
      tags:
      - redirect
  /api/bulk-jobs:
    get:
      parameters:
      - description: Page size
        in: query
        name: limit
        type: integer
      - description: Offset into the result set
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handler.bulkJobResponse'
            type: array
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: List the caller's bulk jobs
      tags:
      - bulk-jobs
    post:
      consumes:
      - application/json
      description: Registers a previously uploaded file (by file_key) as a bulk job
        and queues it for processing.
      parameters:
      - description: Uploaded file key + metadata
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.confirmRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.bulkJobResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Confirm an upload and start a bulk job
      tags:
      - bulk-jobs
  /api/bulk-jobs/{id}:
    get:
      description: Returns the job's status/progress and, once finished, a result_url
        to download the processed file.
      parameters:
      - description: Bulk job ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.bulkJobResponse'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: job not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get a bulk job by ID
      tags:
      - bulk-jobs
  /api/bulk-jobs/{id}/download-url:
    get:
      description: Returns a short-lived presigned URL to download the result file.
        Returns 409 if job is not yet completed.
      parameters:
      - description: Bulk job ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: job not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "409":
          description: result not available yet
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get a presigned download URL for a completed bulk job
      tags:
      - bulk-jobs
  /api/bulk-jobs/template:
    get:
      description: 'Returns an empty template (columns: url, result) for the user
        to fill in and upload.'
      parameters:
      - default: csv
        description: Template format
        enum:
        - csv
        - xlsx
        in: query
        name: format
        type: string
      produces:
      - text/csv
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        "200":
          description: the template file
          schema:
            type: file
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Download the bulk-upload template
      tags:
      - bulk-jobs
  /api/bulk-jobs/upload-url:
    post:
      consumes:
      - application/json
      description: Returns a presigned R2 URL the client PUTs the filled CSV/XLSX
        to, plus the file_key used to confirm the upload.
      parameters:
      - description: File metadata (filename, row_count, content_md5)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.uploadURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.uploadURLResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get a presigned URL to upload a bulk file
      tags:
      - bulk-jobs
  /api/links:
    get:
      parameters:
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Offset into the result set (default 0)
        in: query
        name: offset
        type: integer
      - description: Filter by status
        enum:
        - active
        - disabled
        - expired
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.listResponse'
        "400":
          description: invalid status
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: List the authenticated user's links
      tags:
      - links
    post:
      consumes:
      - application/json
      description: Generates a random short code for the given URL. Optionally expires
        at a future time.
      parameters:
      - description: URL to shorten (expires_at optional, RFC 3339)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.createLinkRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handler.createLinkResponse'
        "400":
          description: invalid url or expiry
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: missing or invalid credentials
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "429":
          description: daily link quota exceeded
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Create a short link
      tags:
      - links
  /api/links/{code}:
    delete:
      description: Permanently deletes the link and its clicks (cascade). Owner-only.
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      responses:
        "204":
          description: deleted
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: short link not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Delete a short link
      tags:
      - links
    put:
      consumes:
      - application/json
      description: 'Replaces the mutable state: set/clear expires_at (null clears)
        and toggle is_active. Owner-only.'
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      - description: expires_at (RFC 3339 or null) + is_active
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler.updateLinkRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.linkResponse'
        "400":
          description: invalid body
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: short link not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Update a short link
      tags:
      - links
  /api/links/{code}/stats:
    get:
      description: Returns the total click count and the most recent clicks for a
        short link.
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_internal_service.LinkStats'
        "401":
          description: missing or invalid token
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: short link not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get click statistics
      tags:
      - links
  /api/plans:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_TranTheTuan_go-shortener_internal_repository.Plan'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      summary: List available plans
      tags:
      - billing
  /api/subscription:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/internal_handler.subscriptionPayload'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get current subscription and quota
      tags:
      - billing
  /api/subscription/portal:
    get:
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
            - properties:
                data:
                  $ref: '#/definitions/internal_handler.portalURLPayload'
              type: object
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: no active Paddle subscription
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "500":
          description: could not generate portal URL
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get Paddle Customer Portal URL
      tags:
      - billing
  /api/subscription/upgrade:
    post:
      consumes:
      - application/json
      parameters:
      - description: plan_id and interval
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.upgradeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "400":
          description: no subscription, invalid plan, no change, or downgrade
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Change active subscription plan tier and/or billing interval
      tags:
      - billing
  /api/terms/accept:
    post:
      consumes:
      - application/json
      parameters:
      - description: terms version
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handler.acceptTermsRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: invalid version or user not found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: not authenticated
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Accept Terms & Conditions
      tags:
      - auth
  /api/terms/status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: 'accepted: bool'
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get terms acceptance status
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_internal_repository.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get the authenticated user
      tags:
      - auth
  /healthz:
    get:
      description: Liveness/readiness probe.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      summary: Health check
      tags:
      - health
  /users:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_TranTheTuan_go-shortener_internal_repository.User'
            type: array
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
  /users/{id}:
    get:
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_internal_repository.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_TranTheTuan_go-shortener_pkg_response.Envelope'
      security:
      - BearerAuth: []
      summary: Get a user by ID
      tags:
      - users
  /webhooks/paddle:
    post:
      consumes:
      - application/json
      parameters:
      - description: Paddle webhook signature
        in: header
        name: X-Paddle-Signature
        required: true
        type: string
      responses:
        "200":
          description: event accepted
        "400":
          description: invalid payload
        "503":
          description: queue full — Paddle should retry
      summary: Receive Paddle webhook event
      tags:
      - billing
securityDefinitions:
  BearerAuth:
    description: 'Keycloak access token. Format: "Bearer {token}".'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
