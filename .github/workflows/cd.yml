name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # --- Image (Docker Hub) ---
  # Full image = <DOCKERHUB_USERNAME>/<IMAGE_NAME>. DOCKERHUB_USERNAME and
  # DOCKERHUB_TOKEN are configured in repository secrets.
  IMAGE_NAME: YOUR-IMAGE-NAME

  # --- GitOps (ArgoCD reads from this repo) ---
  GITOPS_REPO: your-org/your-gitops-repo
  VALUES_PATH: apps/your-service/values.yaml

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute immutable image tag
        id: tag
        run: echo "value=sha-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-gitops:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tag in Helm values
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd gitops
          yq -i '.image.tag = strenv(IMAGE_TAG)' "$VALUES_PATH"
          echo "Updated $VALUES_PATH -> image.tag=$IMAGE_TAG"
          git diff --stat

      - name: Commit and push
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_PATH"
          if git diff --cached --quiet; then
            echo "No manifest changes; image tag already up to date."
            exit 0
          fi
          git commit -m "chore: deploy ${{ env.IMAGE_NAME }} ${IMAGE_TAG} (${GITHUB_SHA::7})"
          git push
